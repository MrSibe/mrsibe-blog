baseURL: https://mrsibe.top/
languageCode: zh-CN
hasCJKLanguage: true
title: 西贝的代码宇宙
theme: ["PaperMod"]

# 分页配置
pagination:
  pagerSize: 10

# 多语言支持
defaultContentLanguage: zh
languages:
  zh:
    languageName: "简体中文"
    weight: 1
    params:
      subtitle: "在星辰与字节之间，写下一行属于宇宙的代码。"

# 分类法配置
taxonomies:
  category: categories
  tag: tags
  archive: archives

# URL 结构配置 - 简洁格式
permalinks:
  posts: /:slug/

# 输出格式（用于搜索功能）
outputs:
  home:
    - HTML
    - RSS
    - JSON

# 性能优化
minify:
  minifyOutput: true
  disableXML: false

caches:
  getresource:
    maxAge: 2h
  images:
    maxAge: 168h  # 1周，优化图片缓存
    dir: ":resourceDir/_gen/images"
  modules:
    maxAge: 2h

# Markdown 渲染器配置
markup:
  goldmark:
    renderer:
      unsafe: true # 允许 HTML
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    lineNos: true
    lineNumbersInTable: true
    noClasses: false
    style: monokai

# 菜单配置
menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 1
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 2
    - identifier: links
      name: 友链
      url: /friends/
      weight: 6

# PaperMod 主题参数
params:
  env: production
  title: 西贝的代码宇宙
  description: |
    这里是西贝的个人博客——一个计算机学生的成长轨迹，也是一片藏在代码里的宇宙。
    从算法到天文，从调试到观星，我记录每一次调试成功的光，也捕捉每一次仰望星空的瞬间。
  keywords:
    - 西贝
    - 啊啊啊啊啊西贝
    - 计算机学习博客
    - 编程学习
    - 天文爱好者
    - 代码宇宙
    - 学生开发者
    - 技术成长记录
    - 算法笔记
    - 观星日常
  author: 啊啊啊啊啊西贝

  # 主题模式
  defaultTheme: auto # auto, light, dark
  disableThemeToggle: false

  # 日期格式
  DateFormat: "2006-01-02"

  # 显示设置 - 优化性能
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  # 首页 Home-Info 模式配置
  homeInfoParams:
    Title: "西贝的代码宇宙 👋"
    Content: 在星辰与字节之间，写下一行属于宇宙的代码。

  # 社交图标
  socialIcons:
    - name: github
      url: "https://github.com/mrsibe"
    - name: email
      url: "mailto:mrsibe@qq.com" # 替换为您的邮箱
    - name: x
      url: "https://x.com/Mr_Sibei" # 替换为您的 Twitter 用户名
    - name: bilibili
      url: "https://space.bilibili.com/386324877" # 替换为您的 B站 UID
    - name: rss
      url: "/index.xml"

  # 网站图标
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.jpg"
    favicon32x32: "/favicon-32x32.jpg"
    apple_touch_icon: "/apple-touch-icon.jpg"
    disableFingerprinting: false

  # Label 配置（页眉左侧）
  label:
    text: "西贝的代码宇宙"
    icon: /images/avatar-128.jpg
    iconHeight: 35

  # Cover 图片设置
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    responsiveImages: true
    linkFullImages: true

  # Google Search Console 验证（新增）
  analytics:
    google:
      SiteVerificationTag: "替换为您的验证码"

# Google Analytics
googleAnalytics: G-BZZVEEJVCS

# 隐私设置
privacy:
  googleAnalytics:
    anonymizeIP: false
    disable: false
    respectDoNotTrack: false
    useSessionStorage: false

# Sitemap 配置（新增）
sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

# 相关文章配置（新增）
related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 80
    - name: date
      weight: 10
